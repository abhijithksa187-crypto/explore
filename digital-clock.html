<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .timezone-label {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .city-name {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .time-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 15px;
        }

        .digital-time {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        .time-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
        }

        .info-label {
            display: block;
            font-size: 9px;
            opacity: 0.7;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .info-value {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .digital-time {
                font-size: 36px;
            }

            .header h1 {
                font-size: 28px;
            }
        }

        .am-pm {
            display: inline-block;
            font-size: 18px;
            margin-left: 10px;
            vertical-align: super;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 World Clock</h1>
            <p>Current time across major cities</p>
        </div>
    </div>

    <script>
        // Timezone data with cities
        const timezones = [
            { city: 'New York', timezone: 'America/New_York', offset: 'UTC-5' },
            { city: 'Los Angeles', timezone: 'America/Los_Angeles', offset: 'UTC-8' },
            { city: 'London', timezone: 'Europe/London', offset: 'UTC+0' },
            { city: 'Paris', timezone: 'Europe/Paris', offset: 'UTC+1' },
            { city: 'Tokyo', timezone: 'Asia/Tokyo', offset: 'UTC+9' },
            { city: 'Sydney', timezone: 'Australia/Sydney', offset: 'UTC+10' },
            { city: 'Dubai', timezone: 'Asia/Dubai', offset: 'UTC+4' },
            { city: 'Singapore', timezone: 'Asia/Singapore', offset: 'UTC+8' },
            { city: 'Mumbai', timezone: 'Asia/Kolkata', offset: 'UTC+5:30' },
            { city: 'Hong Kong', timezone: 'Asia/Hong_Kong', offset: 'UTC+8' },
            { city: 'Toronto', timezone: 'America/Toronto', offset: 'UTC-5' },
            { city: 'São Paulo', timezone: 'America/Sao_Paulo', offset: 'UTC-3' }
        ];

        // Create clock cards
        function createClocks() {
            const container = document.querySelector('.container');
            
            timezones.forEach(tz => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-label">${tz.offset}</div>
                    <div class="city-name">${tz.city}</div>
                    <div class="time-display">
                        <div class="digital-time" data-timezone="${tz.timezone}">00:00:00<span class="am-pm">AM</span></div>
                        <div class="date-display" data-date-timezone="${tz.timezone}">--/--/----</div>
                    </div>
                    <div class="time-info">
                        <div class="info-box">
                            <span class="info-label">Day</span>
                            <span class="info-value" data-day="${tz.timezone}">--</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">Week</span>
                            <span class="info-value" data-week="${tz.timezone}">--</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Update time for all timezones
        function updateTime() {
            const now = new Date();

            timezones.forEach(tz => {
                // Format time using Intl API
                const timeFormatter = new Intl.DateTimeFormat('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false,
                    timeZone: tz.timezone
                });

                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    month: '2-digit',
                    day: '2-digit',
                    year: 'numeric',
                    timeZone: tz.timezone
                });

                const dayFormatter = new Intl.DateTimeFormat('en-US', {
                    weekday: 'short',
                    timeZone: tz.timezone
                });

                const timeString = timeFormatter.format(now);
                const dateString = dateFormatter.format(now);
                const dayString = dayFormatter.format(now);

                // Get time in timezone
                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz.timezone }));
                const hours = tzDate.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';

                // Update time display
                const timeElement = document.querySelector(`[data-timezone="${tz.timezone}"]`);
                if (timeElement) {
                    timeElement.innerHTML = `${timeString}<span class="am-pm">${ampm}</span>`;
                }

                // Update date display
                const dateElement = document.querySelector(`[data-date-timezone="${tz.timezone}"]`);
                if (dateElement) {
                    dateElement.textContent = dateString;
                }

                // Update day display
                const dayElement = document.querySelector(`[data-day="${tz.timezone}"]`);
                if (dayElement) {
                    dayElement.textContent = dayString;
                }

                // Update week number
                const weekElement = document.querySelector(`[data-week="${tz.timezone}"]`);
                if (weekElement) {
                    const weekNumber = getWeekNumber(tzDate);
                    weekElement.textContent = `Week ${weekNumber}`;
                }
            });
        }

        // Calculate week number
        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Initialize
        createClocks();
        updateTime();
        
        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
